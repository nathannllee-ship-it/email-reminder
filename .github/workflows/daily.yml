name: Daily Email Check

on:
  schedule:
    - cron: '0 0 * * *'   # 00:00 UTC = 8:00 PM EDT
  workflow_dispatch: {}     # allows manual "Run workflow" button

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_PUSH }}   # push commits as you, so they count on your graph
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Run email check
        env:
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT }}
        run: python check_email.py
      - name: Commit daily log
        run: |
          git config user.name "Nathan Lee"
          git config user.email "274642347+nathannllee-ship-it@users.noreply.github.com"
          git add history.md
          git commit -m "log: $(date -u +%Y-%m-%d) email check" || { echo "nothing to commit"; exit 0; }
          git push
